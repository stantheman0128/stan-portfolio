# Cloudflare Pages config for stan-portfolio.
# Bindings for the rating endpoint (functions/api/rating.js).
# Production and preview use SEPARATE KV namespaces so test ratings from the
# demo/sprite branch previews never pollute the real data.
# EXPORT_KEY (owner-only export) is a Pages secret, set via:
#   wrangler pages secret put EXPORT_KEY --project-name=stan-portfolio
# CF_ANALYTICS_TOKEN (Account Analytics: Read) powers /api/rum-stats and tools/rum-query.mjs:
#   wrangler pages secret put CF_ANALYTICS_TOKEN --project-name=stan-portfolio

name = "stan-portfolio"
pages_build_output_dir = "dist"

# The / front door is served by functions/index.js, which returns a
# manually Brotli-encoded Response. That requires a modern runtime; without
# this the Git build compiled it on an old compat date and the / route 404d.
compatibility_date = "2024-11-01"

# Production environment bindings.
[[kv_namespaces]]
binding = "RATINGS"
id = "6ac0b3e4dc6d4b89a010abb0b5dbfe65"

# RUM: front-door beacon (/api/rum) writes one data point per visit.
[[analytics_engine_datasets]]
binding = "RUM"
dataset = "rum_events"

# Preview environments (all non-production branch deploys: demo, sprite, ...).
[env.preview]
[[env.preview.kv_namespaces]]
binding = "RATINGS"
id = "0f18e001510f41faa6c476809cbab224"

[[env.preview.analytics_engine_datasets]]
binding = "RUM"
dataset = "rum_events"
