<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Studio — Stan Shih</title>
    <style>
      :root {
        --bg: #0f1012; --panel: #17181b; --line: #2a2c31; --ink: #e8e6e2;
        --mut: #9a978f; --acc: #c2522d; --field: #1e2024; --ok: #4f9d69;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body { background: var(--bg); color: var(--ink);
        font-family: ui-sans-serif, system-ui, "Segoe UI", Helvetica, Arial, sans-serif; }
      #app { display: grid; grid-template-columns: minmax(360px, 44%) 1fr; height: 100vh; }
      #editor { overflow: auto; border-right: 1px solid var(--line); background: var(--panel); }
      #bar { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 10px;
        flex-wrap: wrap; padding: 12px 16px; background: var(--panel); border-bottom: 1px solid var(--line); }
      #bar .grow { flex: 1; }
      #bar strong { font-size: 13px; letter-spacing: .04em; }
      .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
      .seg button { background: transparent; color: var(--mut); border: 0; padding: 6px 12px; cursor: pointer; font-size: 13px; }
      .seg button.on { background: var(--acc); color: #fff; }
      .btn { background: var(--field); color: var(--ink); border: 1px solid var(--line);
        border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
      .btn:hover { border-color: var(--acc); }
      .btn.pub { background: var(--acc); border-color: var(--acc); color: #fff; }
      #status { font-size: 12px; color: var(--mut); }
      #fields { padding: 8px 16px 80px; }
      details.group { border: 1px solid var(--line); border-radius: 10px; margin: 12px 0; background: #141518; }
      details.group > summary { cursor: pointer; padding: 12px 14px; font-weight: 600; font-size: 13px;
        letter-spacing: .03em; list-style: none; display: flex; align-items: center; gap: 8px; }
      details.group > summary::-webkit-details-marker { display: none; }
      details.group > summary::before { content: "▸"; color: var(--mut); }
      details.group[open] > summary::before { content: "▾"; }
      .body { padding: 4px 14px 14px; }
      label.f { display: block; margin: 10px 0; }
      label.f > span { display: block; font-size: 11px; letter-spacing: .05em; text-transform: uppercase;
        color: var(--mut); margin-bottom: 4px; }
      input, textarea, select { width: 100%; background: var(--field); color: var(--ink);
        border: 1px solid var(--line); border-radius: 7px; padding: 8px 10px; font: inherit; font-size: 13px; }
      textarea { resize: vertical; min-height: 52px; line-height: 1.5; }
      input:focus, textarea:focus, select:focus { outline: 0; border-color: var(--acc); }
      .item { border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; margin: 10px 0; background: #16171a; }
      .item .row { display: flex; gap: 8px; align-items: center; }
      .item .row .ttl { flex: 1; font-weight: 600; }
      .mini { background: transparent; color: var(--mut); border: 1px solid var(--line);
        border-radius: 6px; padding: 3px 8px; cursor: pointer; font-size: 12px; }
      .mini:hover { color: var(--ink); border-color: var(--acc); }
      .mini.del:hover { color: #e06666; border-color: #e06666; }
      .sub { border-left: 2px solid var(--line); padding-left: 10px; margin: 8px 0; }
      .linkrow { display: flex; gap: 6px; margin: 6px 0; }
      .linkrow input { flex: 1; }
      .thumb { max-height: 46px; border: 1px solid var(--line); border-radius: 6px; margin-top: 6px; }
      .add { width: 100%; background: transparent; color: var(--mut); border: 1px dashed var(--line);
        border-radius: 8px; padding: 8px; cursor: pointer; font-size: 13px; margin-top: 6px; }
      .add:hover { color: var(--acc); border-color: var(--acc); }
      #previewpane { position: relative; background: #fff; }
      #preview { width: 100%; height: 100%; border: 0; }
      #pfLabel { position: absolute; top: 8px; right: 12px; font-size: 11px; color: #999;
        background: rgba(255,255,255,.8); padding: 2px 8px; border-radius: 6px; pointer-events: none; }
      @media (max-width: 820px) {
        #app { grid-template-columns: 1fr; grid-template-rows: 55vh 45vh; }
        #editor { border-right: 0; border-bottom: 1px solid var(--line); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="editor">
        <header id="bar">
          <strong>✦ Studio</strong>
          <span class="seg" id="themeSeg"></span>
          <span class="grow"></span>
          <span id="status">Loading…</span>
          <button class="btn" id="resetBtn" title="Discard local edits, reload published content">Reset</button>
          <button class="btn" id="exportBtn" title="Download content.json">Export</button>
          <button class="btn pub" id="pubBtn" title="Publish to GitHub">Publish</button>
        </header>
        <div id="fields"></div>
      </div>
      <div id="previewpane">
        <iframe id="preview" title="Live preview"></iframe>
        <div id="pfLabel"></div>
      </div>
    </div>
    <script type="module" src="/src/studio/studio.js"></script>
  </body>
</html>
